executable:
  name: A386_DIANN_v2.3.0
  description: Updated executable configuration for DIANN with improved parameter organization and readability. Derived from params.yml structure.
  program: /home/bfabric/slurmworker/config/A386_DIANN_23/app.yml
  context: APPLICATION
  enabled: 'true'
  parameter:
  - description: DIA-NN version to use. 2.3.2 is the current production default; 2.6.0 is the newest. All versions run in the same .NET 8 image and read Thermo .raw natively.
    context: APPLICATION
    enumeration:
    - 2.3.2
    - 2.5.0
    - 2.5.1
    - 2.6.0
    key: pipeline_diann_version
    label: DIA-NN Version
    modifiable: 'true'
    required: 'true'
    type: STRING
    value: 2.3.2
  - description: 'Workflow mode. two_step: separate library prediction (Step A) then quantification (Step B) — standard mode. single_step: combined library prediction + quantification in one DIA-NN invocation — faster for small-to-medium datasets.'
    context: APPLICATION
    enumeration:
    - two_step
    - single_step
    key: pipeline_workflow_mode
    label: Workflow Mode
    modifiable: 'true'
    required: 'true'
    type: STRING
    value: two_step
  - description: Data acquisition type. Set to true for DDA (Data-Dependent Acquisition), false for DIA (Data-Independent Acquisition).
    context: APPLICATION
    key: pipeline_is_dda
    label: DDA Mode
    modifiable: 'true'
    required: 'true'
    type: BOOLEAN
    value: 'false'
  - description: 'Thermo RAW handling. native: no conversion — DIA-NN reads .raw natively (default, fastest). thermoraw: convert to mzML via ThermoRawFileParser. msconvert: standard mzML conversion. msconvert-demultiplex: mzML conversion with demultiplexing for overlapping DIA windows (multiplexed acquisition).'
    context: APPLICATION
    enumeration:
    - native
    - thermoraw
    - msconvert
    - msconvert-demultiplex
    key: pipeline_raw_converter
    label: RAW File Converter
    modifiable: 'true'
    required: 'true'
    type: STRING
    value: native
