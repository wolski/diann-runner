    context: APPLICATION
    key: lib_mods_met_excision
    label: Met Excision
    modifiable: 'true'
    required: 'true'
    type: BOOLEAN
    value: 'true'
  - description: 'Disable peptidoform scoring (modification localization). Set to true to disable for faster but less accurate modification site assignment. DIA-NN command: --no-peptidoforms'
    context: APPLICATION
    key: lib_mods_no_peptidoforms
    label: Disable Peptidoforms
    modifiable: 'true'
    required: 'true'
    type: BOOLEAN
    value: 'false'
  - description: 'Recommended DIA-NN mass accuracy for Bruker timsTOF (read-only). Source: github.com/vdemichev/DiaNN'
    context: APPLICATION
    key: search_mass_acc_hint_timstof
    label: Rec. mass acc - timsTOF
    modifiable: 'false'
    required: 'true'
    type: STRING
    value: MS1 = 15, MS2 = 15
  - description: 'Recommended DIA-NN mass accuracy for Orbitrap / Astral (read-only). Source: github.com/vdemichev/DiaNN'
    context: APPLICATION
    key: search_mass_acc_hint_orbitrap
    label: Rec. mass acc - Orbitrap
    modifiable: 'false'
    required: 'true'
    type: STRING
    value: 'By MS2 resolution: 240k=4, 120k=7, 60k=10, 30k=15. Astral: MS1=4, MS2=10. Set MS1 similar or tighter.'
  - description: 'Recommended DIA-NN mass accuracy for SCIEX TripleTOF 6600 / ZenoTOF (read-only). Source: github.com/vdemichev/DiaNN'
    context: APPLICATION
    key: search_mass_acc_hint_tof
    label: Rec. mass acc - TripleTOF/ZenoTOF
    modifiable: 'false'
    required: 'true'
    type: STRING
    value: MS1 = 20, MS2 = 20
  - description: 'When to leave MS1/MS2 = AUTO (read-only). Source: github.com/vdemichev/DiaNN'
    context: APPLICATION
    key: search_mass_acc_hint_auto
    label: Rec. mass acc - use AUTO when
    modifiable: 'false'
    required: 'true'
    type: STRING
    value: Exploratory/unknown instrument only. DIA-NN tunes from the FIRST run (noisy, order-dependent). Fix MS1/MS2 to the values above for final/large studies.
  - description: 'MS1 (precursor) mass accuracy in ppm. Lower values are more stringent. DIA-NN command: --mass-acc-ms1'
    context: APPLICATION
    enumeration:
    - '4'
    - '5'
    - '7'
    - '10'
    - '15'
    - '20'
    - AUTO
    key: search_mass_acc_ms1
    label: MS1 Mass Accuracy (ppm)
    modifiable: 'true'
    required: 'true'
    type: STRING
    value: AUTO
  - description: 'MS2 (fragment) mass accuracy in ppm. Lower values are more stringent. DIA-NN command: --mass-acc'
    context: APPLICATION
    enumeration:
    - '4'
    - '5'
    - '7'
    - '10'
    - '15'
    - '20'
    - AUTO
    key: search_mass_acc_ms2
    label: MS2 Mass Accuracy (ppm)
    modifiable: 'true'
    required: 'true'
    type: STRING
    value: AUTO
  - description: 'Treat runs as unrelated: mass accuracy (when automatic) and the retention time scan window are determined separately for each run, instead of being taken from the first run. Meaningful mainly when MS1/MS2 Mass Accuracy and Scan Window are AUTO; fixed values override the automatic tuning. If Reanalyse (MBR) is enabled, the runner also emits --mbr-fix-settings to keep the second MBR pass on shared settings. DIA-NN command: --individual-mass-acc --individual-windows'
    context: APPLICATION
    key: search_mass_acc_unrelated_runs
    label: Unrelated Runs
    modifiable: 'true'
    required: 'true'
    type: BOOLEAN
    value: 'false'
  - description: 'False Discovery Rate (FDR) threshold (q-value). Lower values are more stringent. Typical: 0.01 (1%). DIA-NN command: --qvalue'
    context: APPLICATION
    enumeration:
    - '0.001'
    - '0.01'
    - '0.05'
    key: search_scoring_qvalue
    label: FDR Q-value
    modifiable: 'true'
    required: 'true'
    type: STRING
    value: '0.01'
  - description: 'Protein grouping level (DIA-NN --pg-level): 0=isoform IDs, 1=protein names, 2=genes (default). Sets the protein inference / proteotypicity level.'
    context: APPLICATION
    enumeration:
    - 0_isoform_IDs
    - 1_protein_names
    - 2_genes
    key: search_protein_pg_level
    label: Protein Grouping Level
    modifiable: 'true'
    required: 'true'
    type: STRING
    value: 2_genes
  - description: 'Use protein IDs as gene names when FASTA lacks GN= annotations. Useful for non-model organisms or custom databases without gene name fields. DIA-NN command: --ids-to-names'
    context: APPLICATION
    key: search_protein_ids_to_names
    label: IDs to Names
    modifiable: 'true'
    required: 'true'
    type: BOOLEAN
    value: 'false'
  - description: 'Scan window radius (in scans). Set to AUTO for automatic determination. DIA-NN command: --window'
    context: APPLICATION
    enumeration:
    - AUTO
    - '3'
    - '5'
    - '8'
    - '12'
    - '17'
    - '23'
    - '30'
    key: quant_scan_window
    label: Scan Window
    modifiable: 'true'
    required: 'true'
    type: STRING
    value: AUTO
  - description: 'Enable match-between-runs (MBR) and library refinement. DIA-NN command: --reanalyse'
    context: APPLICATION
    key: quant_reanalyse
    label: Enable Reanalyse (MBR)
    modifiable: 'true'
    required: 'true'
    type: BOOLEAN
    value: 'true'
  - description: 'Disable cross-run normalization. DIA-NN command: --no-norm'
    context: APPLICATION
    key: quant_no_norm
    label: Disable Normalization
    modifiable: 'true'
    required: 'true'
    type: BOOLEAN
    value: 'false'
  - description: 'Export fragment-level per-run quantities in the DIA-NN report. Adds fragment quantity and correlation columns needed by downstream fragment-level converters. This can substantially increase report size. DIA-NN command: --export-quant'
    context: APPLICATION
    key: output_fragment_quant
    label: Export Fragment Quantities
    modifiable: 'true'
    required: 'true'
    type: BOOLEAN
    value: 'false'
  - description: Include spectral library files (predicted and refined) as a separate zip in staged output. Libraries are large files; enable only if needed for downstream reuse.
    context: APPLICATION
    key: output_include_libs
    label: Include Spectral Libraries
    modifiable: 'true'
    required: 'true'
    type: BOOLEAN
    value: 'false'
  - description: Generate a pmultiqc HTML report from the DIA-NN report as an extra QC artifact (alongside diann-qc and prolfqua QC). Report-derived sections populate; experimental-design and MS1-level metrics are not shown.
    context: APPLICATION
    key: output_pmultiqc
    label: Generate pmultiqc HTML report
    modifiable: 'true'
    required: 'true'
