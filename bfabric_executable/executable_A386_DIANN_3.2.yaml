  - description: 'Variable modifications: format is --var-mods [count] --var-mod UniMod:[id],[mass],[sites]. Note: UniMod:21 (Phospho), UniMod:1 (Acetyl), UniMod:121 (DiGly) have PTM scoring enabled by default. Use --monitor-mod for other PTMs. DIA-NN commands: --var-mods, --var-mod, --monitor-mod'
    context: APPLICATION
    enumeration:
    - --var-mods 1 --var-mod UniMod:35,15.994915,M
    - --var-mods 2 --var-mod UniMod:35,15.994915,M
    - --var-mods 1 --var-mod UniMod:21,79.966331,STY
    - --var-mods 2 --var-mod UniMod:21,79.966331,STY
    - --var-mods 3 --var-mod UniMod:21,79.966331,STY
