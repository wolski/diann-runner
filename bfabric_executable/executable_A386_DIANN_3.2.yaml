    label: Variable Modifications
    modifiable: 'true'
    required: 'true'
    type: STRING
    value: --var-mods 1 --var-mod UniMod:35,15.994915,M
  - description: 'Enable UniMod:4 (Carbamidomethyl on Cysteine) as fixed modification. Standard for alkylated samples. DIA-NN command: --unimod4'
