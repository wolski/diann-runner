    label: Add Custom Sequences
    modifiable: 'true'
    required: 'true'
    type: BOOLEAN
    value: 'true'
  - description: 'Enzyme cleavage specificity. Default: K*,R* (Trypsin). Format: [residue]*,[residue]* where * indicates cleavage after residue. DIA-NN command: --cut'
    context: APPLICATION
    enumeration:
    - K*,R*
    - K*,R*,!*P
    key: lib_digestion_cut
    label: Enzyme Cut Sites
    modifiable: 'true'
    required: 'true'
    type: STRING
    value: K*,R*
  - description: 'Maximum number of missed cleavages allowed during in silico digestion. DIA-NN command: --missed-cleavages'
    context: APPLICATION
