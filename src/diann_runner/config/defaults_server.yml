# Production server deployment settings

# DIA-NN settings
threads: 64
# Image map keyed by 01_diann_version dropdown value.
diann_images:
  "2.3.2": "diann:2.3.2"
  "2.5.0": "diann:2.5.0-thermo"
# Legacy fallback for old params.yml without 01_diann_version.
diann_docker_image: "diann:2.3.2"

# File conversion (Docker images for thermoraw CLI)
thermoraw_image: "thermorawfileparser:2.0.0"
msconvert_docker: "chambm/pwiz-skyline-i-agree-to-the-vendor-licenses"

# QC and staging
prolfquapp_image: "prolfqua/prolfquapp:2.0.10"
app_runner: "fgcz_app_runner"
