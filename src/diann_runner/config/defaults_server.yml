# Production server deployment settings.
#
# Both runtime blocks live here. The right one is selected at runtime
# based on what is installed on the host (apptainer wins if both are
# present). See diann_runner.container_utils.detect_runtime().
#
# To pin the runtime instead of auto-detecting (e.g. a host that has apptainer
# installed but no SIF cache), uncomment:
# container_runtime: docker   # or: apptainer

threads: 24
app_runner: "fgcz_app_runner"

images:
  docker:
    # DIA-NN images keyed by pipeline_diann_version dropdown value.
    diann_images:
      "2.3.2": "diann:2.3.2"
      "2.5.0": "diann:2.5.0"
      "2.5.1": "diann:2.5.1"
      "2.6.0": "diann:2.6.0"
    # Legacy fallback for old params.yml without pipeline_diann_version.
    diann_docker_image: "diann:2.3.2"
    # File conversion images.
    thermoraw_image: "thermorawfileparser:2.0.0"
    msconvert_docker: "chambm/pwiz-skyline-i-agree-to-the-vendor-licenses"
    # QC. X.Y.Z+ reads native DIA-NN 2.x output (parquet / Run column) directly,
    # so the runner no longer renames Run->File.Name into a prolfqua-format TSV.
    prolfquapp_image: "prolfqua/prolfquapp:2.2.8"

  apptainer:
    # SIF paths. Shared FGCZ apptainer cache, populated by deploy.smk
    # (see README_DEPLOYMENT.md).
    diann_images:
      "2.3.2": "/misc/fgcz01/nextflow_apptainer_cache/diann_2.3.2.sif"
      "2.5.0": "/misc/fgcz01/nextflow_apptainer_cache/diann_2.5.0.sif"
      "2.5.1": "/misc/fgcz01/nextflow_apptainer_cache/diann_2.5.1.sif"
      "2.6.0": "/misc/fgcz01/nextflow_apptainer_cache/diann_2.6.0.sif"
    diann_docker_image: "/misc/fgcz01/nextflow_apptainer_cache/diann_2.3.2.sif"
    thermoraw_image: "/misc/fgcz01/nextflow_apptainer_cache/thermorawfileparser_2.0.0.sif"
    msconvert_docker: "/misc/fgcz01/nextflow_apptainer_cache/pwiz.sif"
    prolfquapp_image: "/misc/fgcz01/nextflow_apptainer_cache/prolfquapp_2.2.8.sif"

# Build-time settings for deploy.smk (building/pulling the images above).
# Kept here, next to the image definitions, so there is a single config
# source and no separate deploy file to drift. Image *versions* are not
# repeated — deploy.smk derives them from the images block above. Override
# any of these for a one-off build with `--config key=value`.
deploy:
  # Where deploy.smk writes/pulls SIFs. The shared FGCZ apptainer cache is
  # also where the runtime workflow (images.apptainer above) reads them from.
  sif_output_dir: /misc/fgcz01/nextflow_apptainer_cache
  # SIF builder: "native" (apptainer build from .def, no docker) or "docker"
  # (convert local docker images via docker-daemon://).
  sif_builder: native
  # Rebuild/repull images even when they already exist.
  force_rebuild: false
