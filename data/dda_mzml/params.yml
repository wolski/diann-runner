# params.yml - B-Fabric flat-key params for a direct `diann-snakemake` local run.
# Top level (registration, params) must be preserved. Keys under `params:` are the
# flat B-Fabric XML keys consumed by parse_flat_params() -> build_internal_params().

registration:
  workunit_id: "12345"
  container_id: "67890"

params:
  # Workflow control: run Step C after Step B (false = use Step B outputs directly).
  enable_step_c: false

  # Pipeline / run setup
  pipeline_is_dda: 'true'
  pipeline_workflow_mode: two_step
  pipeline_raw_converter: thermoraw

  # Input FASTA
  input_fasta_databases: ProteoBenchFASTA_MixedSpecies_HYE.fasta
  input_fasta_additional: None
  input_fasta_use_custom: 'false'

  # Library generation: digestion
  lib_digestion_cut: K*,R*
  lib_digestion_missed_cleavages: '1'

  # Library generation: peptide / precursor / fragment ranges
  lib_peptide_min_length: '6'
  lib_peptide_max_length: '30'
  lib_precursor_charge_min: '2'
  lib_precursor_charge_max: '3'
  lib_precursor_mz_min: '400'
  lib_precursor_mz_max: '1500'
  lib_fragment_mz_min: '200'
  lib_fragment_mz_max: '1800'

  # Library generation: modifications
  lib_mods_variable: --var-mods 1 --var-mod UniMod:35,15.994915,M
  lib_mods_unimod4: 'true'
  lib_mods_met_excision: 'true'
  lib_mods_no_peptidoforms: 'false'

  # Search & scoring
  search_mass_acc_ms1: '15'
  search_mass_acc_ms2: '20'
  search_scoring_qvalue: '0.01'
  search_protein_pg_level: 2_genes

  # Quantification
  quant_reanalyse: 'true'
  quant_no_norm: 'false'

  # Advanced
  advanced_verbose: '1'
