# Committed SUSHI params for the `run-diann sushi` dry-run integration test.
#
# This is the flat readable-key mapping a real SUSHI job emits — i.e. exactly
# what EzAppDiann dumps to sushi_params.yml. The values are taken from a real
# SUSHI invocation (tests/.../Proteomics_DIANN_input_685.sh), NOT reverse-
# engineered from an AppRunner params.yml.
#
# input_fasta_databases + the dataset's raw paths point into ../WU346549/input/
# (run `make setup` there to download them, ~9 GB). dataRoot keeps the
# production value; run.sh overrides it with --data-root <this dir> so the
# '../WU346549/...' paths resolve against this fixture dir.
cores: '8'
process_mode: DATASET
name: DIANN_v23
pipeline_diann_version: '2.5.1'
input_fasta_use_custom: 'false'
input_fasta_databases: ../WU346549/input/p34486_Proteobench_TripleProteome_20240614.fasta
pipeline_workflow_mode: two_step
pipeline_is_dda: 'false'
quant_scan_window: AUTO
lib_mods_variable: --var-mods 1 --var-mod UniMod:35,15.994915,M
lib_mods_no_peptidoforms: 'false'
lib_mods_unimod4: 'true'
lib_mods_met_excision: 'true'
lib_peptide_min_length: '6'
lib_peptide_max_length: '30'
lib_precursor_charge_min: '1'
lib_precursor_charge_max: '3'
lib_precursor_mz_min: '350'
lib_precursor_mz_max: '1500'
lib_fragment_mz_min: '200'
lib_fragment_mz_max: '1800'
lib_digestion_cut: K*,R*
lib_digestion_missed_cleavages: '1'
search_mass_acc_ms1: AUTO
search_mass_acc_ms2: AUTO
search_scoring_qvalue: '0.01'
search_protein_pg_level: 1_protein_names
quant_reanalyse: 'true'
quant_no_norm: 'false'
advanced_freestyle: 'None'
pipeline_raw_converter: thermoraw
advanced_verbose: '1'
dataRoot: /srv/gstore/projects
